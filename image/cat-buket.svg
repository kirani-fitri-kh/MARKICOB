<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#F7F2EA"/>
  <circle cx="340" cy="80" r="60" fill="#D8C3A5" opacity="0.4"/>
  <circle cx="50" cy="80" r="45" fill="#B9A7D9" opacity="0.35"/>
  <!-- wrap paper -->
  <polygon points="200,180 110,340 290,340" fill="#B9A7D9"/>
  <polygon points="200,180 150,340 200,340" fill="#a692cc"/>
  <!-- stems -->
  <line x1="200" y1="180" x2="180" y2="120" stroke="#1E2A44" stroke-width="4"/>
  <line x1="200" y1="180" x2="200" y2="110" stroke="#1E2A44" stroke-width="4"/>
  <line x1="200" y1="180" x2="222" y2="120" stroke="#1E2A44" stroke-width="4"/>
  <!-- flowers -->
  <g transform="translate(180,110)">
    <circle cx="0" cy="-6" r="14" fill="#1E2A44"/>
    <circle cx="-12" cy="6" r="14" fill="#1E2A44"/>
    <circle cx="12" cy="6" r="14" fill="#1E2A44"/>
    <circle cx="0" cy="10" r="14" fill="#1E2A44"/>
    <circle cx="0" cy="2" r="9" fill="#D8C3A5"/>
  </g>
  <g transform="translate(200,100)">
    <circle cx="0" cy="-6" r="16" fill="#B9A7D9"/>
    <circle cx="-14" cy="7" r="16" fill="#B9A7D9"/>
    <circle cx="14" cy="7" r="16" fill="#B9A7D9"/>
    <circle cx="0" cy="12" r="16" fill="#B9A7D9"/>
    <circle cx="0" cy="3" r="10" fill="#1E2A44"/>
  </g>
  <g transform="translate(222,112)">
    <circle cx="0" cy="-5" r="12" fill="#D8C3A5"/>
    <circle cx="-10" cy="5" r="12" fill="#D8C3A5"/>
    <circle cx="10" cy="5" r="12" fill="#D8C3A5"/>
    <circle cx="0" cy="9" r="12" fill="#D8C3A5"/>
    <circle cx="0" cy="2" r="8" fill="#1E2A44"/>
  </g>
  <!-- ribbon bow on wrap -->
  <path d="M180 210 q20 -20 40 0 q-20 15 -40 0z" fill="#1E2A44"/>
  <circle cx="200" cy="210" r="7" fill="#F7F2EA"/>
</svg>
